name: Deploy to DEV
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pgsql, gd, bcmath, intl

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Create .env file
        run: |
          echo "APP_NAME='${{ vars.DEV__APP_NAME }}'" >> .env
          echo "APP_ENV=${{ vars.DEV__APP_ENV }}" >> .env
          echo "APP_KEY=${{ secrets.DEV__APP_KEY }}" >> .env
          echo "APP_URL=${{ vars.DEV__APP_URL }}" >> .env
          echo "APP_DEBUG=${{ vars.DEV__APP_DEBUG }}" >> .env
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=${{ secrets.DEV__DB_HOST }}" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=${{ secrets.DEV__DB_DATABASE }}" >> .env
          echo "DB_USERNAME=${{ secrets.DEV__DB_USERNAME }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DEV__DB_PASSWORD }}" >> .env
          echo "VITE_APP_NAME=\"${{ vars.DEV__APP_NAME }}\"" >> .env

      - name: Install node_modules
        run: npm ci && npm install --save-dev @rollup/rollup-linux-x64-gnu

      - name: Build assets (Vite)
        run: npm run build

      - name: Set maintenance mode
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEV__REMOTE_HOST }}
          username: ${{ secrets.DEV__REMOTE_USER }}
          port: 22
          key: ${{ secrets.DEV__SSH_PRIVATE_KEY }}
          script: "cd ${{ vars.DEV__REMOTE_PATH }} && (/usr/bin/php8.4 artisan down) || true"

      - name: rsync deploy
        uses: burnett01/rsync-deployments@5.2
        with:
          switches: -avzr --delete --exclude 'storage/' --exclude .git
          path: .
          remote_host: ${{ secrets.DEV__REMOTE_HOST }}
          remote_user: ${{ secrets.DEV__REMOTE_USER }}
          remote_key: ${{ secrets.DEV__SSH_PRIVATE_KEY }}
          remote_path: ${{ vars.DEV__REMOTE_PATH }}

      - name: storage rsync deploy
        uses: burnett01/rsync-deployments@5.2
        with:
          switches: -avzr
          path: ./storage/.
          remote_host: ${{ secrets.DEV__REMOTE_HOST }}
          remote_user: ${{ secrets.DEV__REMOTE_USER }}
          remote_key: ${{ secrets.DEV__SSH_PRIVATE_KEY }}
          remote_path: "${{ vars.DEV__REMOTE_PATH }}/storage"

      - name: Deploy to server (PHP actions)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEV__REMOTE_HOST }}
          username: ${{ secrets.DEV__REMOTE_USER }}
          port: 22
          key: ${{ secrets.DEV__SSH_PRIVATE_KEY }}
          script: "cd ${{ vars.DEV__REMOTE_PATH }} &&
            export PATH=/usr/bin:/usr/local/bin:$PATH &&
            /usr/bin/php8.4 /usr/local/bin/composer install --prefer-dist --no-dev --no-interaction --optimize-autoloader &&
            /usr/bin/php8.4 artisan storage:link &&
            /usr/bin/php8.4 artisan migrate --force &&
            /usr/bin/php8.4 artisan cache:clear &&
            /usr/bin/php8.4 artisan view:cache &&
            /usr/bin/php8.4 artisan config:cache &&
            /usr/bin/php8.4 artisan up"
